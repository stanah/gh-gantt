<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gh-gantt</title>
    <script>
      (function () {
        var t = localStorage.getItem("gh-gantt-theme") || "system";
        var dark =
          t === "dark" || (t === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.dataset.theme = "dark";
      })();
    </script>
    <style>
      :root {
        /* ── Brand ── */
        --color-primary: #2563eb;
        --color-primary-light: #3b82f6;
        --color-accent: #f97316;

        /* ── Surfaces ── */
        --color-bg: #fafafa;
        --color-surface: #ffffff;
        --color-border: #e0e0e0;
        --color-border-light: #f0f0f0;

        /* ── Text ── */
        --color-text: #1a1a2e;
        --color-text-secondary: #666;
        --color-text-muted: #888;

        /* ── Semantic ── */
        --color-success: #27ae60;
        --color-danger: #e74c3c;
        --color-danger-dark: #c0392b;
        --color-warning: #f39c12;
        --color-warning-dark: #d35400;
        --color-info: #3498db;
        --color-complete: #8957e5;
        --color-in-progress: #3fb950;

        /* ── Semantic backgrounds ── */
        --color-danger-bg: #fdecea;
        --color-warning-bg: #fff4db;
        --color-info-bg: #e8f4fd;
        --color-complete-bg: #f5f0ff;
        --color-success-bg: #e6f7ed;

        /* ── Interactive states ── */
        --color-selected-bg: #e8f0fe;
        --color-selected-fg: #1a73e8;
        --color-selected-border: #c5d7f7;
        --color-hover-bg: #f5f8ff;
        --color-highlight-search: #fef08a;

        /* ── Relation highlights ── */
        --color-highlight-parent-bg: #f5f0ff;
        --color-highlight-parent-border: #8957e5;
        --color-highlight-blocker-bg: #fef2f2;
        --color-highlight-blocker-border: #e74c3c;

        /* ── Drop states ── */
        --color-drop-reparent-bg: #e8f0fe;
        --color-drop-reparent-border: #4285f4;
        --color-drop-dependency-bg: #fef3e2;
        --color-drop-dependency-border: #e67e22;
        --color-drop-invalid-bg: #fef2f2;

        /* ── At-risk badge ── */
        --color-atrisk-bg: #ffe8bd;
        --color-atrisk-fg: #7a4b00;

        /* ── Priority ── */
        --color-priority-low-bg: #f0f0f0;
        --color-priority-low-fg: #888;
        --color-priority-low-border: #bbb4;
      }
      [data-theme="dark"] {
        /* ── Brand ── */
        --color-primary: #58a6ff;
        --color-primary-light: #79c0ff;
        --color-accent: #f0883e;

        /* ── Surfaces ── */
        --color-bg: #0d1117;
        --color-surface: #161b22;
        --color-border: #30363d;
        --color-border-light: #21262d;

        /* ── Text ── */
        --color-text: #c9d1d9;
        --color-text-secondary: #8b949e;
        --color-text-muted: #6e7681;

        /* ── Semantic ── */
        --color-success: #3fb950;
        --color-danger: #f85149;
        --color-danger-dark: #da3633;
        --color-warning: #e3b341;
        --color-warning-dark: #d29922;
        --color-info: #58a6ff;
        --color-complete: #bc8cff;
        --color-in-progress: #3fb950;

        /* ── Semantic backgrounds ── */
        --color-danger-bg: rgba(248, 81, 73, 0.1);
        --color-warning-bg: rgba(227, 179, 65, 0.1);
        --color-info-bg: rgba(56, 139, 253, 0.1);
        --color-complete-bg: rgba(137, 87, 229, 0.1);
        --color-success-bg: rgba(63, 185, 80, 0.1);

        /* ── Interactive states ── */
        --color-selected-bg: rgba(56, 139, 253, 0.15);
        --color-selected-fg: #58a6ff;
        --color-selected-border: #1f6feb;
        --color-hover-bg: rgba(56, 139, 253, 0.08);
        --color-highlight-search: rgba(227, 179, 65, 0.3);

        /* ── Relation highlights ── */
        --color-highlight-parent-bg: rgba(137, 87, 229, 0.15);
        --color-highlight-parent-border: #bc8cff;
        --color-highlight-blocker-bg: rgba(248, 81, 73, 0.15);
        --color-highlight-blocker-border: #f85149;

        /* ── Drop states ── */
        --color-drop-reparent-bg: rgba(56, 139, 253, 0.15);
        --color-drop-reparent-border: #58a6ff;
        --color-drop-dependency-bg: rgba(240, 136, 62, 0.15);
        --color-drop-dependency-border: #f0883e;
        --color-drop-invalid-bg: rgba(248, 81, 73, 0.15);

        /* ── At-risk badge ── */
        --color-atrisk-bg: rgba(227, 179, 65, 0.2);
        --color-atrisk-fg: #e3b341;

        /* ── Priority ── */
        --color-priority-low-bg: #21262d;
        --color-priority-low-fg: #8b949e;
        --color-priority-low-border: rgba(139, 148, 158, 0.25);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body,
      #root {
        height: 100%;
        width: 100%;
        overflow: hidden;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 13px;
        color: var(--color-text);
        background: var(--color-bg);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
