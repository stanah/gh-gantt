# .github/workflows/secret-scan.yml
# betterleaks による秘密情報スキャン専用 workflow (ADR-011)
#
# 既存 ci.yml は push:[main] + pull_request:[main] のみでトリガーされるため、
# feature branch 直 push をカバーできない。本 workflow は全 branch push と
# pull_request の両方で発火し、全 ref 全 commit をスキャンする。

name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # 既定の fetch-depth: 1 では直近 commit しか取得されず、
          # --log-opts="--all" を指定しても走査対象が存在しない。
          # 0 で checkout される ref の全履歴を取得する。
          fetch-depth: 0

      - name: Fetch all refs and tags for full-history scan
        run: |
          # actions/checkout は fetch-depth: 0 でも基本的に checkout 対象 ref と
          # その祖先のみを fetch するため、betterleaks の --log-opts="--all" が
          # 他 branch / tag を走査できない。明示的に全 refs と tags を fetch して
          # 「全 ref 全 commit スキャン」の約束を確実に満たす。
          git fetch --force --prune origin \
            '+refs/heads/*:refs/remotes/origin/*' \
            '+refs/tags/*:refs/tags/*'

      - name: betterleaks (scan all refs, full history)
        run: |
          # GIT_CONFIG_COUNT + safe.directory: コンテナ内の git が host runner の
          # ファイル所有権を "dubious" 扱いして "0 commits scanned" の偽陰性を返す
          # 問題を防ぐ。これ無しでは検出が発火せず常に pass する致命的バグになる。
          # マウントは :ro でスキャン対象を保護し、-w /src で betterleaks が
          # .betterleaks.toml を自動検出できるようにする。
          # @sha256 digest pin でタグ差し替えによるサプライチェーン攻撃を防ぐ。
          docker run --rm \
            -v "${{ github.workspace }}":/src:ro \
            -w /src \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e GIT_CONFIG_VALUE_0='*' \
            ghcr.io/betterleaks/betterleaks:v1.1.2@sha256:05a6e6cea419b8013cd3c361b6edf307a558615490d3d28f78f46887911f1512 \
            git --log-opts="--all" --no-color --redact=75 -v /src
          # --log-opts="--all" で全 ref の全 commit を対象にする。
          # --redact=75 で CI ログに secret が露出しないよう 75% 伏せ字にする。
          # -v で検出時のレポートを詳細出力する。
