# .github/workflows/secret-scan.yml
# betterleaks による秘密情報スキャン専用 workflow (ADR-011)
#
# 既存 ci.yml は push:[main] + pull_request:[main] のみでトリガーされるため、
# feature branch 直 push をカバーできない。本 workflow は全 branch push と
# pull_request の両方で発火し、全 ref 全 commit をスキャンする。

name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # 既定の fetch-depth: 1 では直近 commit しか取得されず、
          # --log-opts="--all" を指定しても走査対象が存在しない。
          # 0 で全履歴を取得する。
          fetch-depth: 0

      - name: betterleaks (scan all refs, full history)
        run: |
          # GIT_CONFIG_COUNT + safe.directory: コンテナ内の git が host runner の
          # ファイル所有権を "dubious" 扱いして "0 commits scanned" の偽陰性を返す
          # 問題を防ぐ。これ無しでは検出が発火せず常に pass する致命的バグになる。
          docker run --rm -v "${{ github.workspace }}":/src \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e GIT_CONFIG_VALUE_0='*' \
            ghcr.io/betterleaks/betterleaks:v1.1.2 \
            git --log-opts="--all" --no-color --redact=75 -v /src
          # --log-opts="--all" で全 ref の全 commit を対象にする。
          # --redact=75 で CI ログに secret が露出しないよう 75% 伏せ字にする。
          # -v で検出時のレポートを詳細出力する。
