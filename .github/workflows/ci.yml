name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          version: "0.1.13"
          cache: true

      - run: vp install
      - run: vp check
      - run: vp run test
      - run: vp run build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ci
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          version: "0.1.13"
          cache: true

      - run: vp install
      - run: vp run build
      - run: vp exec playwright install chromium --with-deps
      - run: vp run test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
