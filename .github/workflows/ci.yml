name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: voidzero-dev/setup-vp@624fe22ccfe9204a526ac8139186d34297453722 # v1
        with:
          node-version: "22"
          cache: true

      - run: vp install
      - run: vp check
      - run: vp run build

      - name: Test with JSON reporter
        run: |
          vp --filter @gh-gantt/shared exec vp test run --reporter=default --reporter=json --outputFile=../../test-results-shared.json
          vp --filter @gh-gantt/cli exec vp test run --exclude 'src/__tests__/e2e-sync.test.ts' --reporter=default --reporter=json --outputFile=../../test-results-cli.json
          vp --filter @gh-gantt/ui exec vp test run --reporter=default --reporter=json --outputFile=../../test-results-ui.json

      - name: Generate docs
        run: vp run docs:gen

      - name: Validate requirements traceability
        run: |
          vp run req:trace
          vp run req:validate

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ci
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: voidzero-dev/setup-vp@624fe22ccfe9204a526ac8139186d34297453722 # v1
        with:
          node-version: "22"
          cache: true

      - run: vp install
      - run: vp run build
      - run: vp exec playwright install chromium --with-deps
      - run: vp run test:e2e

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
