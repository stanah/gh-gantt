no_tty: true

commit-msg:
  jobs:
    - name: commitlint
      # Conventional Commits 規約をコミットメッセージに強制する (ADR-009)
      run: pnpm exec commitlint --edit {1}

pre-commit:
  jobs:
    - name: branch-check
      # マージ済み PR があるブランチへの誤コミットを防止する。
      # main/master ブランチへの直接コミットも警告する。
      run: |
        branch=$(git branch --show-current)
        if [ "$branch" = "main" ] || [ "$branch" = "master" ]; then
          echo "⚠ main ブランチへの直接コミットです。意図的な場合は --no-verify で回避してください。"
          exit 1
        fi
        if command -v gh >/dev/null 2>&1; then
          state=$(gh pr list --head "$branch" --state merged --json number --jq '.[0].number // empty' 2>/dev/null)
          if [ -n "$state" ]; then
            echo "⚠ このブランチの PR #$state は既にマージ済みです。main に戻って新しいブランチを作成してください。"
            exit 1
          fi
        fi
    - name: lint
      run: vp check < /dev/null
    - name: betterleaks
      # staged 差分に秘密情報が含まれていないか検査する (ADR-011)。
      # docker が利用不可 (未インストール / daemon 停止) の環境では skip し、
      # CI (secret-scan workflow) を最終ゲートとする。
      run: |
        # docker CLI が無い、または daemon に繋がらない場合は skip。
        # `docker info` は daemon 到達性まで検査するため `command -v docker` より確実。
        if ! command -v docker >/dev/null 2>&1 || ! docker info >/dev/null 2>&1; then
          echo "⚠ docker が利用できません (未インストール or daemon 停止): betterleaks スキャンをスキップします (CI では検出されます)"
          exit 0
        fi
        # staged 差分がなければスキャン不要
        if git diff --cached --quiet; then
          exit 0
        fi
        # 差分を stdin 経由で betterleaks に渡す。
        # --redact=75 で万一ログ出力に secret が混ざっても 75% obfuscate される。
        # --no-color は lefthook ログの視認性のため。
        git diff --cached -U0 | docker run --rm -i \
          ghcr.io/betterleaks/betterleaks:v1.1.2 \
          stdin --no-color --redact=75

pre-push:
  # CI (.github/workflows/ci.yml) と同等のチェックをローカルで再現する。
  # CI で落ちてから修正する手間を排除するため、push 前に全チェックを実行する。
  jobs:
    - name: test
      # test:json は test + JSON レポーター出力。req:trace の入力となる。
      run: vp run test:json < /dev/null
    - name: build
      run: vp run build < /dev/null
    - name: req-trace
      # テスト結果 JSON から requirements.yaml のトレーサビリティを再生成し、
      # コミット済みの requirements.yaml と差分がないことを検証する。
      run: |
        vp run req:trace < /dev/null
        git diff --exit-code docs/requirements.yaml || (echo "requirements.yaml is out of date. Run 'pnpm req:trace' and commit." && exit 1)
    - name: req-validate
      # テストファイルの [FR-*]/[NFR-*] タグと requirements.yaml の整合性を検証する。
      run: vp run req:validate < /dev/null
    - name: docs-gen
      # docs/generated/ は gitignore 対象のため差分検出は行わず、
      # ドキュメント生成コマンド自体が成功することのみ確認する。
      run: vp run docs:gen < /dev/null
