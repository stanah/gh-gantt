  - id: STABILITY
    name: Stability & Reliability
    description: |
      クロスカッティングな安定性要件。データ整合性、silent failure 禁止、
      環境差異対応、リグレッション防止を横断的に保証する。
      詳細な設計判断は ADR-007 (Phase ベースのロードマップ)、
      ADR-008 (実環境スモークテスト) を参照。
    requirements:
      - id: NFR-STABILITY-001
        summary: sync-state と tasks.json の整合性保証
        acceptance_criteria:
          - id: NFR-STABILITY-001-AC1
            description: |
              snapshot.hash と tasks.json の内容が不整合な状態で sync 操作を
              実行した場合、操作前に検知してエラーを返す
            status: uncovered
            tests: []
          - id: NFR-STABILITY-001-AC2
            description: |
              resolve --theirs で全コンフリクトを解決した場合、
              snapshot.hash が正しく更新される (regression #154)
            status: uncovered
            tests: []
          - id: NFR-STABILITY-001-AC3
            description: |
              gh-gantt を経由せず作成された Issue (GitHub UI / gh issue create /
              PR マージによる自動追加 / sync-state.json 直接編集等) が tasks.json
              に存在する状況で、次回の pull 時に id_map が projectData.items から
              authoritative に rebuild され、push が silent skip せず正常に動作する
              (regression #167)
            status: covered
            tests:
              - packages/cli/src/__tests__/regressions/issue-167-pull-id-map-rebuild.test.ts
          - id: NFR-STABILITY-001-AC4
            description: |
              validateSyncState が「tasks.json に存在するが id_map に無い」という
              逆方向の不整合 (missing_id_map) を検出し、次回 pull で自動修復される
              旨をユーザーに提示する (regression #167)
            status: covered
            tests:
              - packages/cli/src/__tests__/validate-sync-state.test.ts
          - id: NFR-STABILITY-001-AC5
            description: |
              pull がハッシュ一致 (内容変更なし) の場合でも snapshot.updated_at
              を remote 側の updated_at に追従させ、status コマンドが false positive
              な「Remote changes」を報告しない (regression #169, #36)
            status: covered
            tests:
              - packages/cli/src/__tests__/regressions/issue-169-status-false-remote-changes.test.ts
              - packages/cli/src/__tests__/regressions/issue-197-status-remote-changed-stale-updated-at.test.ts
      - id: NFR-STABILITY-002
        summary: silent failure の禁止
        acceptance_criteria:
          - id: NFR-STABILITY-002-AC1
            description: |
              sub-issue や blocked-by 設定時に issue_node_id が欠損している
              場合、無言でスキップせずエラーまたは警告として顕在化する
              (regression #153)
            status: covered
            tests:
              - packages/cli/src/__tests__/regressions/issue-233-relation-node-id.test.ts
          - id: NFR-STABILITY-002-AC2
            description: |
              バグ修正 PR には必ず tests/regressions/issue-<N>-<slug>.test.ts
              の形式でリグレッションテストを追加する (規律)
            status: covered
            tests:
              - packages/cli/src/__tests__/regressions/issue-233-relation-node-id.test.ts
      - id: NFR-STABILITY-003
        summary: Org 環境と個人環境の両方で主要 CLI コマンドが動作する
        acceptance_criteria:
          - id: NFR-STABILITY-003-AC1
            description: |
              個人リポジトリに対して init → pull が Labels フォールバックで
              正しく動作し、生成された gantt.config.json がスナップショットと
              一致する
            status: covered
