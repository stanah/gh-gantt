version: "1.0"
vision: |
  GitHub Projects (V2) と双方向同期し、タスクの時間軸・依存関係・
  階層的進捗をガントチャートで可視化する CLI ツール。
  AI エージェントと人間が同じワークフローでプロジェクトを管理できる。

areas:
  - id: SYNC
    name: Sync Engine
    description: GitHub Projects (V2) との双方向同期
    requirements:
      - id: FR-SYNC-001
        summary: 3-way merge によるコンフリクト検出・解決
        acceptance_criteria:
          - id: FR-SYNC-001-AC1
            description: ローカル・リモート両方が変更した場合にコンフリクトを検出する
            status: uncovered
            tests: []
          - id: FR-SYNC-001-AC2
            description: コンフリクトマーカーを生成しユーザーに解決を促す
            status: uncovered
            tests: []
          - id: FR-SYNC-001-AC3
            description: コンフリクトの検出と解決操作を CLI で実行できる
            status: uncovered
            tests: []
      - id: FR-SYNC-002
        summary: pull による GitHub → ローカル同期
        acceptance_criteria:
          - id: FR-SYNC-002-AC1
            description: リモートの変更をローカルにマージできる
            status: uncovered
            tests: []
          - id: FR-SYNC-002-AC2
            description: 未解決コンフリクトがある場合は pull を拒否する
            status: uncovered
            tests: []
      - id: FR-SYNC-003
        summary: push によるローカル → GitHub 同期
        acceptance_criteria:
          - id: FR-SYNC-003-AC1
            description: ローカルの変更を GitHub に反映できる
            status: uncovered
            tests: []
          - id: FR-SYNC-003-AC2
            description: dry run で変更内容をプレビューできる
            status: uncovered
            tests: []
          - id: FR-SYNC-003-AC3
            description: 未解決コンフリクトがある場合は push を拒否する
            status: uncovered
            tests: []
      - id: FR-SYNC-004
        summary: リモートデータからローカルタスクへのマッピング
        acceptance_criteria:
          - id: FR-SYNC-004-AC1
            description: GitHub Project Item をローカル Task 形式に変換できる
            status: uncovered
            tests: []
      - id: FR-SYNC-005
        summary: タスクのハッシュによる変更検出
        acceptance_criteria:
          - id: FR-SYNC-005-AC1
            description: タスクの内容からハッシュを算出し変更を検出できる
            status: uncovered
            tests: []
      - id: FR-SYNC-006
        summary: syncFields のリベース
        acceptance_criteria:
          - id: FR-SYNC-006-AC1
            description: pull 時に syncFields を最新のスナップショットにリベースできる
            status: uncovered
            tests: []
      - id: NFR-SYNC-001
        summary: push 中の障害耐性
        acceptance_criteria:
          - id: NFR-SYNC-001-AC1
            description: push 中に API エラーが発生しても snapshot が不整合にならない
            status: uncovered
            tests: []
          - id: NFR-SYNC-001-AC2
            description: push 途中の進捗を保存し中断からの再開を可能にする
            status: uncovered
            tests: []
      - id: NFR-SYNC-002
        summary: 同期エンジンの API アクセス効率
        acceptance_criteria:
          - id: NFR-SYNC-002-AC1
            description: 変更のないタスクに対して不要な API コールを行わない
            status: uncovered
            tests: []

  - id: HIER
    name: Task Hierarchy
    description: タスクの親子関係と依存関係の管理
    requirements:
      - id: FR-HIER-001
        summary: タスクの親子関係管理
        acceptance_criteria:
          - id: FR-HIER-001-AC1
            description: タスクの親子関係を設定・変更・削除できる
            status: uncovered
            tests: []
          - id: FR-HIER-001-AC2
            description: 循環参照を検出し拒否する
            status: uncovered
            tests: []
          - id: FR-HIER-001-AC3
            description: type_hierarchy に基づき許可されない親子関係を拒否する
            status: uncovered
            tests: []
      - id: FR-HIER-002
        summary: 階層的な進捗集約
        acceptance_criteria:
          - id: FR-HIER-002-AC1
            description: 親タスクの進捗が子タスクの状態から自動算出される
            status: uncovered
            tests: []
      - id: FR-HIER-003
        summary: 依存関係管理
        acceptance_criteria:
          - id: FR-HIER-003-AC1
            description: タスク間の依存関係を追加・削除できる
            status: uncovered
            tests: []
          - id: FR-HIER-003-AC2
            description: 依存関係の循環を検出する
            status: uncovered
            tests: []
      - id: FR-HIER-004
        summary: タスクタイプの解決
        acceptance_criteria:
          - id: FR-HIER-004-AC1
            description: ラベルや Issue Type からタスクタイプを正しく解決できる
            status: uncovered
            tests: []

  - id: CLI
    name: CLI Interface
    description: AI エージェントと人間が同じワークフローで操作できる CLI
    requirements:
      - id: FR-CLI-001
        summary: タスク一覧表示とフィルタリング
        acceptance_criteria:
          - id: FR-CLI-001-AC1
            description: タスクを一覧表示しステータス・タイプ・アサインでフィルタできる
            status: uncovered
            tests: []
          - id: FR-CLI-001-AC2
            description: --type オプションで不正なタイプが指定された場合エラーを返す
            status: uncovered
            tests: []
      - id: FR-CLI-002
        summary: タスク詳細表示
        acceptance_criteria:
          - id: FR-CLI-002-AC1
            description: タスク ID を指定して詳細情報を表示できる
            status: uncovered
            tests: []
          - id: FR-CLI-002-AC2
            description: 存在しないタスク ID でエラーを返す
            status: uncovered
            tests: []
      - id: FR-CLI-003
        summary: タスク更新
        acceptance_criteria:
          - id: FR-CLI-003-AC1
            description: タスクのフィールドを更新できる
            status: uncovered
            tests: []
      - id: FR-CLI-004
        summary: ドラフトタスク作成
        acceptance_criteria:
          - id: FR-CLI-004-AC1
            description: GitHub Issue を作成せずローカルにドラフトタスクを作成できる
            status: uncovered
            tests: []
          - id: FR-CLI-004-AC2
            description: ドラフトタスク ID は一意に生成される
            status: uncovered
            tests: []
      - id: FR-CLI-005
        summary: マイルストーン管理
        acceptance_criteria:
          - id: FR-CLI-005-AC1
            description: マイルストーンをタスクとして同期・表示できる
            status: uncovered
            tests: []
      - id: FR-CLI-006
        summary: コマンド体系
        acceptance_criteria:
          - id: FR-CLI-006-AC1
            description: init/pull/push/status/create/list/show/update/link/serve/conflicts/resolve コマンドが定義されている
            status: uncovered
            tests: []
      - id: FR-CLI-007
        summary: タスク ID の柔軟な解決
        acceptance_criteria:
          - id: FR-CLI-007-AC1
            description: Issue 番号または内部 ID でタスクを一意に特定できる
            status: uncovered
            tests: []

  - id: API
    name: REST API
    description: UI と CLI の間のデータアクセス層
    requirements:
      - id: FR-API-001
        summary: タスク CRUD
        acceptance_criteria:
          - id: FR-API-001-AC1
            description: GET/POST/PATCH/DELETE でタスクを操作できる
            status: uncovered
            tests: []
      - id: FR-API-002
        summary: 同期操作 API
        acceptance_criteria:
          - id: FR-API-002-AC1
            description: pull/push/status の操作を API 経由で実行できる
            status: uncovered
            tests: []
      - id: FR-API-003
        summary: タスクの reparent
        acceptance_criteria:
          - id: FR-API-003-AC1
            description: API 経由でタスクの親子関係を変更できる
            status: uncovered
            tests: []
          - id: FR-API-003-AC2
            description: 自己参照・循環・階層違反を API レベルで拒否する
            status: uncovered
            tests: []

  - id: VIS
    name: Visualization
    description: ガントチャートによるプロジェクト可視化
    requirements:
      - id: FR-VIS-001
        summary: ガントチャート表示
        acceptance_criteria:
          - id: FR-VIS-001-AC1
            description: タスクをガントバーとして時間軸上に表示する
            status: uncovered
            tests: []
      - id: FR-VIS-002
        summary: タスクツリー表示
        acceptance_criteria:
          - id: FR-VIS-002-AC1
            description: タスクの階層構造をツリーとして表示できる
            status: uncovered
            tests: []
      - id: FR-VIS-003
        summary: フィルタリングとスケール切替
        acceptance_criteria:
          - id: FR-VIS-003-AC1
            description: ビュースケールを week/month/quarter/year で切替できる
            status: uncovered
            tests: []
      - id: FR-VIS-004
        summary: キーボードショートカット
        acceptance_criteria:
          - id: FR-VIS-004-AC1
            description: キーボードでタスク選択・展開・操作ができる
            status: uncovered
            tests: []
      - id: FR-VIS-005
        summary: ドラッグ&ドロップによるタスク移動
        acceptance_criteria:
          - id: FR-VIS-005-AC1
            description: ツリー上でタスクをドラッグして親子関係を変更できる
            status: uncovered
            tests: []
      - id: FR-VIS-006
        summary: タスク詳細パネル
        acceptance_criteria:
          - id: FR-VIS-006-AC1
            description: タスクの詳細情報をパネルに表示する
            status: uncovered
            tests: []
      - id: FR-VIS-007
        summary: 日付計算ユーティリティ
        acceptance_criteria:
          - id: FR-VIS-007-AC1
            description: 営業日計算・日付レンジ・スケジュールステータスを正しく算出する
            status: uncovered
            tests: []
      - id: FR-VIS-008
        summary: サマリーバーの日付算出
        acceptance_criteria:
          - id: FR-VIS-008-AC1
            description: 子タスクの日付範囲からサマリーバーの開始・終了を算出する
            status: uncovered
            tests: []
      - id: FR-VIS-009
        summary: Undo/Redo
        acceptance_criteria:
          - id: FR-VIS-009-AC1
            description: 操作の取り消しとやり直しができる
            status: uncovered
            tests: []

  - id: STORE
    name: Data Store
    description: ローカルデータの永続化とバリデーション
    requirements:
      - id: FR-STORE-001
        summary: 設定ファイルの読み書き
        acceptance_criteria:
          - id: FR-STORE-001-AC1
            description: gantt.config.json を Zod バリデーション付きで読み書きできる
            status: uncovered
            tests: []
      - id: FR-STORE-002
        summary: タスクファイルの読み書き
        acceptance_criteria:
          - id: FR-STORE-002-AC1
            description: tasks.json を Zod バリデーション付きで読み書きできる
            status: uncovered
            tests: []
      - id: NFR-STORE-001
        summary: スキーマバリデーション
        acceptance_criteria:
          - id: NFR-STORE-001-AC1
            description: 不正な形式のファイルを読み込んだ場合にバリデーションエラーを返す
            status: uncovered
            tests: []
