      - id: NFR-STABILITY-004
        summary: スモークテストの継続実行による回帰検知
        acceptance_criteria:
          - id: NFR-STABILITY-004-AC1
            description: |
              pnpm smoke:personal / pnpm smoke:org がローカルから実行可能で、
