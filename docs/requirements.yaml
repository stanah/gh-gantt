version: "1.0"
vision: |
  GitHub Projects (V2) と双方向同期し、タスクの時間軸・依存関係・
  階層的進捗をガントチャートで可視化する CLI ツール。
  AI エージェントと人間が同じワークフローでプロジェクトを管理できる。
areas:
  - id: SYNC
    name: Sync Engine
    description: GitHub Projects (V2) との双方向同期
    requirements:
      - id: FR-SYNC-001
        summary: 3-way merge によるコンフリクト検出・解決
        acceptance_criteria:
          - id: FR-SYNC-001-AC1
            description: ローカル・リモート両方が変更した場合にコンフリクトを検出する
            status: covered
            tests:
              - packages/cli/src/__tests__/three-way-merge.test.ts
          - id: FR-SYNC-001-AC2
            description: コンフリクトマーカーを生成しユーザーに解決を促す
            status: covered
            tests:
              - packages/cli/src/__tests__/conflict-marker.test.ts
          - id: FR-SYNC-001-AC3
            description: コンフリクトの検出と解決操作を CLI で実行できる
            status: covered
            tests:
              - packages/cli/src/__tests__/conflicts-command.test.ts
          - id: FR-SYNC-001-AC4
            description: リモート削除 + ローカル変更ありの場合、警告を表示しタスクをローカルに保持する (delete/modify コンフリクト)
            status: uncovered
            tests: []
      - id: FR-SYNC-002
        summary: pull による GitHub → ローカル同期
        acceptance_criteria:
          - id: FR-SYNC-002-AC1
            description: リモートの変更をローカルにマージできる
            status: uncovered
            tests: []
          - id: FR-SYNC-002-AC2
            description: 未解決コンフリクトがある場合は pull を拒否する
            status: uncovered
            tests: []
      - id: FR-SYNC-003
        summary: push によるローカル → GitHub 同期
        acceptance_criteria:
          - id: FR-SYNC-003-AC1
            description: ローカルの変更を GitHub に反映できる
            status: covered
            tests:
              - packages/cli/src/__tests__/push-executor.test.ts
          - id: FR-SYNC-003-AC2
            description: dry run で変更内容をプレビューできる
            status: covered
            tests:
              - packages/cli/src/__tests__/diff.test.ts
          - id: FR-SYNC-003-AC3
            description: 未解決コンフリクトがある場合は push を拒否する
            status: uncovered
            tests: []
      - id: FR-SYNC-004
        summary: リモートデータからローカルタスクへのマッピング
        acceptance_criteria:
          - id: FR-SYNC-004-AC1
            description: GitHub Project Item をローカル Task 形式に変換できる
            status: covered
            tests:
              - packages/cli/src/__tests__/mapper.test.ts
      - id: FR-SYNC-005
        summary: タスクのハッシュによる変更検出
        acceptance_criteria:
          - id: FR-SYNC-005-AC1
            description: タスクの内容からハッシュを算出し変更を検出できる
            status: covered
            tests:
              - packages/cli/src/__tests__/hash.test.ts
      - id: FR-SYNC-006
        summary: syncFields のリベース
        acceptance_criteria:
          - id: FR-SYNC-006-AC1
            description: pull 時に syncFields を最新のスナップショットにリベースできる
            status: covered
            tests:
              - packages/cli/src/__tests__/rebase.test.ts
      - id: FR-SYNC-007
        summary: Linked PR メタデータ同期
        acceptance_criteria:
          - id: FR-SYNC-007-AC1
            description: GitHub Issue に紐づく PR の number/title/state/url を取得できる
            status: covered
            tests:
              - packages/cli/src/__tests__/fetch-project.test.ts
          - id: FR-SYNC-007-AC2
            description: 取得した linked PR メタデータを Task.linked_prs にマッピングできる
            status: covered
            tests:
              - packages/cli/src/__tests__/mapper.test.ts
      - id: NFR-SYNC-001
        summary: push 中の障害耐性
        acceptance_criteria:
          - id: NFR-SYNC-001-AC1
            description: push 中に API エラーが発生しても snapshot が不整合にならない
            status: covered
            tests:
              - packages/cli/src/__tests__/push-executor.test.ts
          - id: NFR-SYNC-001-AC2
            description: push 途中の進捗を保存し中断からの再開を可能にする
            status: covered
            tests:
              - packages/cli/src/__tests__/push-progress.test.ts
      - id: NFR-SYNC-002
        summary: 同期エンジンの API アクセス効率
        acceptance_criteria:
          - id: NFR-SYNC-002-AC1
            description: 変更のないタスクに対して不要な API コールを行わない
            status: covered
            tests:
              - packages/cli/src/__tests__/diff.test.ts
  - id: HIER
    name: Task Hierarchy
    description: タスクの親子関係と依存関係の管理
    requirements:
      - id: FR-HIER-001
        summary: タスクの親子関係管理
        acceptance_criteria:
          - id: FR-HIER-001-AC1
            description: タスクの親子関係を設定・変更・削除できる
            status: covered
            tests:
              - packages/cli/src/__tests__/task-commands.test.ts
          - id: FR-HIER-001-AC2
            description: 循環参照を検出し拒否する
            status: covered
            tests:
              - packages/ui/src/__tests__/validation.test.ts
          - id: FR-HIER-001-AC3
            description: type_hierarchy に基づき許可されない親子関係を拒否する
            status: covered
            tests:
              - packages/ui/src/__tests__/validation.test.ts
      - id: FR-HIER-002
        summary: 階層的な進捗集約
        acceptance_criteria:
          - id: FR-HIER-002-AC1
            description: 親タスクの進捗が子タスクの状態から自動算出される
            status: covered
            tests:
              - packages/ui/src/__tests__/progress.test.ts
      - id: FR-HIER-003
        summary: 依存関係管理
        acceptance_criteria:
          - id: FR-HIER-003-AC1
            description: タスク間の依存関係を追加・削除できる
            status: covered
            tests:
              - packages/cli/src/__tests__/task-commands.test.ts
          - id: FR-HIER-003-AC2
            description: 依存関係の循環を検出する
            status: covered
            tests:
              - packages/ui/src/__tests__/dependency-graph.test.ts
      - id: FR-HIER-004
        summary: タスクタイプの解決
        acceptance_criteria:
          - id: FR-HIER-004-AC1
            description: ラベルや Issue Type からタスクタイプを正しく解決できる
            status: covered
            tests:
              - packages/cli/src/__tests__/type-resolver.test.ts
  - id: CLI
    name: CLI Interface
    description: AI エージェントと人間が同じワークフローで操作できる CLI
    requirements:
      - id: FR-CLI-001
        summary: タスク一覧表示とフィルタリング
        acceptance_criteria:
          - id: FR-CLI-001-AC1
            description: タスクを一覧表示しステータス・タイプ・アサインでフィルタできる
            status: covered
            tests:
              - packages/cli/src/__tests__/command-actions.test.ts
          - id: FR-CLI-001-AC2
            description: --type オプションで不正なタイプが指定された場合エラーを返す
            status: covered
            tests:
              - packages/cli/src/__tests__/task-list-validation.test.ts
          - id: FR-CLI-001-AC3
            description: タスク一覧で更新日時を表示し、更新日時によるソートと絞り込みができる
            status: covered
            tests:
              - packages/cli/src/__tests__/task-commands.test.ts
              - packages/cli/src/__tests__/task-list-validation.test.ts
      - id: FR-CLI-002
        summary: タスク詳細表示
        acceptance_criteria:
          - id: FR-CLI-002-AC1
            description: タスク ID を指定して詳細情報を表示できる
            status: uncovered
            tests: []
          - id: FR-CLI-002-AC2
            description: 存在しないタスク ID でエラーを返す
            status: uncovered
            tests: []
      - id: FR-CLI-003
        summary: タスク更新
        acceptance_criteria:
          - id: FR-CLI-003-AC1
            description: タスクのフィールドを更新できる
            status: uncovered
            tests: []
      - id: FR-CLI-004
        summary: ドラフトタスク作成
        acceptance_criteria:
          - id: FR-CLI-004-AC1
            description: GitHub Issue を作成せずローカルにドラフトタスクを作成できる
            status: uncovered
            tests: []
          - id: FR-CLI-004-AC2
            description: ドラフトタスク ID は一意に生成される
            status: covered
            tests:
              - packages/cli/src/__tests__/draft-tasks.test.ts
      - id: FR-CLI-005
        summary: マイルストーン管理
        acceptance_criteria:
          - id: FR-CLI-005-AC1
            description: マイルストーンをタスクとして同期・表示できる
            status: covered
            tests:
              - packages/cli/src/__tests__/milestone.test.ts
      - id: FR-CLI-006
        summary: コマンド体系
        acceptance_criteria:
          - id: FR-CLI-006-AC1
            description: init/pull/push/status/create/list/show/update/link/context/sprint/serve/conflicts/resolve/ac コマンドが定義されている
            status: covered
            tests:
              - packages/cli/src/__tests__/command-structure.test.ts
      - id: FR-CLI-007
        summary: タスク ID の柔軟な解決
        acceptance_criteria:
          - id: FR-CLI-007-AC1
            description: Issue 番号または内部 ID でタスクを一意に特定できる
            status: covered
            tests:
              - packages/cli/src/__tests__/task-id.test.ts
      - id: FR-CLI-008
        summary: セッション文脈の復元
        acceptance_criteria:
          - id: FR-CLI-008-AC1
            description: context コマンドが作業中タスク・open PR・直近更新タスク・ブロッカー・推奨次アクションを集約できる
            status: covered
            tests:
              - packages/cli/src/__tests__/context.test.ts
          - id: FR-CLI-008-AC2
            description: context --json が機械可読な JSON を出力できる
            status: covered
            tests:
              - packages/cli/src/__tests__/context.test.ts
      - id: FR-CLI-009
        summary: スプリント設定 CRUD
        acceptance_criteria:
          - id: FR-CLI-009-AC1
            description: sprint CLI で config の sprints を list/create/update/delete できる
            status: covered
            tests:
              - packages/cli/src/__tests__/sprint-command.test.ts
          - id: FR-CLI-009-AC2
            description: sprint CLI は重複 name と不正な日付範囲を拒否する
            status: covered
            tests:
              - packages/cli/src/__tests__/sprint-command.test.ts
      - id: FR-CLI-010
        summary: スプリントへのタスク移動
        acceptance_criteria:
          - id: FR-CLI-010-AC1
            description: sprint assign で指定 task の start_date/end_date を sprint 期間へ更新できる
            status: covered
            tests:
              - packages/cli/src/__tests__/sprint-command.test.ts
          - id: FR-CLI-010-AC2
            description: sprint carry-over で source sprint 内の未完了 task を target sprint へ移動できる
            status: covered
            tests:
              - packages/cli/src/__tests__/sprint-command.test.ts
          - id: FR-CLI-010-AC3
            description: unknown sprint、unknown task、不正な引数では失敗し既存 task を変更しない
            status: covered
            tests:
              - packages/cli/src/__tests__/sprint-command.test.ts
      - id: FR-CLI-011
        summary: 受入基準の first-class 操作
        acceptance_criteria:
          - id: FR-CLI-011-AC1
            description: Task.acceptance_criteria を first-class フィールドとして保存形式で扱える
            status: covered
            tests:
              - packages/shared/src/__tests__/schema.test.ts
          - id: FR-CLI-011-AC2
            description: ac add/check で task の受入基準を追加し完了にできる
            status: covered
            tests:
              - packages/cli/src/__tests__/acceptance-criteria-command.test.ts
          - id: FR-CLI-011-AC3
            description: show と GitHub Issue body 同期で受入基準を機械可読に維持できる
            status: covered
            tests:
              - packages/cli/src/__tests__/diff.test.ts
              - packages/cli/src/__tests__/hash.test.ts
              - packages/cli/src/__tests__/json-output.test.ts
              - packages/cli/src/__tests__/three-way-merge.test.ts
              - packages/shared/src/__tests__/acceptance-criteria.test.ts
      - id: FR-CLI-012
        summary: タスクテンプレートの受入基準スロット
        acceptance_criteria:
          - id: FR-CLI-012-AC1
            description: create --template は task_templates の mapping からテンプレートファイルを解決できる
            status: covered
            tests:
              - packages/cli/src/__tests__/create-template.test.ts
          - id: FR-CLI-012-AC2
            description: テンプレート内の AC プレースホルダを空の受入基準セクションとして生成できる
            status: covered
            tests:
              - packages/cli/src/__tests__/create-template.test.ts
              - packages/cli/src/__tests__/hash.test.ts
              - packages/cli/src/__tests__/mapper.test.ts
              - packages/shared/src/__tests__/acceptance-criteria.test.ts
              - packages/shared/src/__tests__/schema.test.ts
          - id: FR-CLI-012-AC3
            description: テンプレート生成後の draft task に ac add で受入基準を追加できる
            status: covered
            tests:
              - packages/cli/src/__tests__/create-template.test.ts
      - id: FR-CLI-013
        summary: タスクのロール分離
        acceptance_criteria:
          - id: FR-CLI-013-AC1
            description: Task.implementer/reviewer を first-class フィールドとして保存形式と JSON 出力で扱える
            status: covered
            tests:
              - packages/cli/src/__tests__/json-output.test.ts
              - packages/shared/src/__tests__/schema.test.ts
          - id: FR-CLI-013-AC2
            description: update コマンドで implementer/reviewer を assignees と独立して設定でき、同一人物を拒否できる
            status: covered
            tests:
              - packages/cli/src/__tests__/task-commands.test.ts
          - id: FR-CLI-013-AC3
            description: implementer/reviewer を同期ハッシュ・差分・3-way merge・GitHub Issue body 往復で維持できる
            status: covered
            tests:
              - packages/cli/src/__tests__/diff.test.ts
              - packages/cli/src/__tests__/hash.test.ts
              - packages/cli/src/__tests__/mapper.test.ts
              - packages/cli/src/__tests__/push-executor.test.ts
              - packages/cli/src/__tests__/three-way-merge.test.ts
              - packages/shared/src/__tests__/task-roles.test.ts
      - id: FR-CLI-014
        summary: レビュー必須フラグ
        acceptance_criteria:
          - id: FR-CLI-014-AC1
            description: require_review_for_types と Task.require_review / review_approved_* を保存形式と JSON 出力で扱える
            status: covered
            tests:
              - packages/cli/src/__tests__/json-output.test.ts
              - packages/shared/src/__tests__/schema.test.ts
          - id: FR-CLI-014-AC2
            description: create/update コマンドで task 単位の review requirement と reviewer approval を設定できる
            status: covered
            tests:
              - packages/cli/src/__tests__/create-template.test.ts
              - packages/cli/src/__tests__/task-commands.test.ts
          - id: FR-CLI-014-AC3
            description: review required な task の close は reviewer approval を要求し、同期ハッシュ・3-way merge・GitHub Issue body 往復で維持できる
            status: covered
            tests:
              - packages/cli/src/__tests__/command-structure.test.ts
              - packages/cli/src/__tests__/diff.test.ts
              - packages/cli/src/__tests__/hash.test.ts
              - packages/cli/src/__tests__/mapper.test.ts
              - packages/cli/src/__tests__/push-executor.test.ts
              - packages/cli/src/__tests__/task-commands.test.ts
              - packages/cli/src/__tests__/three-way-merge.test.ts
              - packages/shared/src/__tests__/task-review.test.ts
      - id: FR-CLI-015
        summary: タスクサイズ閾値の超過警告
        acceptance_criteria:
          - id: FR-CLI-015-AC1
            description: gantt.config.json で max_task_size_hours と estimate_hours field mapping を設定できる
            status: covered
            tests:
              - packages/shared/src/__tests__/schema.test.ts
              - packages/shared/src/__tests__/task-size.test.ts
          - id: FR-CLI-015-AC2
            description: create --estimate-hours は閾値超過時に JSON 出力を壊さず分解を促す警告を出す
            status: covered
            tests:
              - packages/cli/src/__tests__/create-template.test.ts
          - id: FR-CLI-015-AC3
            description: doctor と push 同期は estimate_hours の閾値超過を検出し、number custom field として維持できる
            status: covered
            tests:
              - packages/cli/src/__tests__/doctor.test.ts
              - packages/cli/src/__tests__/push-executor.test.ts
      - id: FR-CLI-016
        summary: エビデンスベースのタスク close
        acceptance_criteria:
          - id: FR-CLI-016-AC1
            description: close --evidence は close 時の証跡を Issue body に記録できる
            status: covered
            tests:
              - packages/cli/src/__tests__/command-structure.test.ts
              - packages/cli/src/__tests__/task-close-command.test.ts
              - packages/cli/src/__tests__/task-commands.test.ts
          - id: FR-CLI-016-AC2
            description: require_close_evidence 設定が有効な場合は evidence なし close を拒否できる
            status: covered
            tests:
              - packages/cli/src/__tests__/task-commands.test.ts
              - packages/shared/src/__tests__/schema.test.ts
          - id: FR-CLI-016-AC3
            description: acceptance criteria が first-class field として存在する場合、未完了 AC がある task close を拒否できる
            status: covered
            tests:
              - packages/cli/src/__tests__/task-commands.test.ts
          - id: FR-CLI-016-AC4
            description: close evidence block は GitHub Issue body 往復で保持できる
            status: covered
            tests:
              - packages/shared/src/__tests__/task-close-evidence.test.ts
  - id: API
    name: REST API
    description: UI と CLI の間のデータアクセス層
    requirements:
      - id: FR-API-001
        summary: タスク CRUD
        acceptance_criteria:
          - id: FR-API-001-AC1
            description: GET/POST/PATCH/DELETE でタスクを操作できる
            status: uncovered
            tests: []
      - id: FR-API-002
        summary: 同期操作 API
        acceptance_criteria:
          - id: FR-API-002-AC1
            description: pull/push/status の操作を API 経由で実行できる
            status: uncovered
            tests: []
      - id: FR-API-003
        summary: タスクの reparent
        acceptance_criteria:
          - id: FR-API-003-AC1
            description: API 経由でタスクの親子関係を変更できる
            status: uncovered
            tests: []
          - id: FR-API-003-AC2
            description: 自己参照・循環・階層違反を API レベルで拒否する
            status: uncovered
            tests: []
      - id: FR-API-004
        summary: Sprint 設定取得
        acceptance_criteria:
          - id: FR-API-004-AC1
            description: GET /api/config が gantt.config.json の sprints 設定を返す
            status: covered
            tests:
              - packages/cli/src/__tests__/server-api.test.ts
      - id: FR-API-005
        summary: スプリント期間へのタスク日付更新
        acceptance_criteria:
          - id: FR-API-005-AC1
            description: PATCH /api/tasks/:id が sprint 期間として渡された start_date/end_date を保存できる
            status: covered
            tests:
              - packages/cli/src/__tests__/server-api.test.ts
  - id: VIS
    name: Visualization
    description: ガントチャートによるプロジェクト可視化
    requirements:
      - id: FR-VIS-001
        summary: ガントチャート表示
        acceptance_criteria:
          - id: FR-VIS-001-AC1
            description: タスクをガントバーとして時間軸上に表示する
            status: uncovered
            tests: []
      - id: FR-VIS-002
        summary: タスクツリー表示
        acceptance_criteria:
          - id: FR-VIS-002-AC1
            description: タスクの階層構造をツリーとして表示できる
            status: uncovered
            tests: []
      - id: FR-VIS-003
        summary: フィルタリングとスケール切替
        acceptance_criteria:
          - id: FR-VIS-003-AC1
            description: ビュースケールを week/month/quarter/year で切替できる
            status: uncovered
            tests: []
          - id: FR-VIS-003-AC2
            description: タスク一覧を更新日時の昇順・降順で並べ替えできる
            status: covered
            tests:
              - packages/ui/src/__tests__/updated-at-display.test.tsx
      - id: FR-VIS-004
        summary: キーボードショートカット
        acceptance_criteria:
          - id: FR-VIS-004-AC1
            description: キーボードでタスク選択・展開・操作ができる
            status: covered
            tests:
              - packages/ui/src/__tests__/useKeyboardShortcuts.test.ts
      - id: FR-VIS-005
        summary: ドラッグ&ドロップによるタスク移動
        acceptance_criteria:
          - id: FR-VIS-005-AC1
            description: ツリー上でタスクをドラッグして親子関係を変更できる
            status: covered
            tests:
              - packages/ui/src/__tests__/useTreeDragDrop.test.ts
      - id: FR-VIS-006
        summary: タスク詳細パネル
        acceptance_criteria:
          - id: FR-VIS-006-AC1
            description: タスクの詳細情報をパネルに表示する
            status: uncovered
            tests: []
          - id: FR-VIS-006-AC2
            description: タスク行と詳細パネルに更新日時を表示できる
            status: covered
            tests:
              - packages/ui/src/__tests__/updated-at-display.test.tsx
          - id: FR-VIS-006-AC3
            description: 1カラムレイアウトでもタスクの Status、Priority、Type、日付を編集できる
            status: covered
            tests:
